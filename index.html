<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ClearCalc — Global Loan & Tax Calculator</title>
  <style>
    :root{--ink:#25333a;--muted:#6b767b;--coral:#f46f52;--cream:#fbf6ec;--line:#eadfd1;--teal:#218f83}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 10%,#fff,#fbf6ec 55%,#f7efe4);color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif}button,input,select{font:inherit}
    header{max-width:1200px;margin:auto;padding:20px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:900}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,#ff8b68,#f25540);color:#fff}.tag{font-size:11px;background:#fff0e7;color:#d9573c;padding:5px 9px;border-radius:99px}.selectors{display:flex;gap:8px}.selectors select,.region select{border:1px solid var(--line);background:#fffaf3;border-radius:11px;padding:10px 12px;color:var(--ink)}
    .hero{text-align:center;padding:45px 20px 25px}.eyebrow{display:inline-block;background:#fff0e7;color:#d9573c;padding:6px 11px;border-radius:99px;font-weight:800}.hero h1{font-size:clamp(36px,5vw,64px);letter-spacing:-2px;line-height:1.08;margin:20px auto 12px}.hero p{color:var(--muted);font-size:18px}.region{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:22px;font-weight:800}
    .tabs{max-width:1160px;margin:25px auto 18px;padding:0 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.tabs button{display:grid;grid-template-columns:55px 1fr;text-align:left;gap:4px 12px;padding:22px;border:1.5px solid var(--line);border-radius:20px;background:#fffdf9;cursor:pointer}.tabs button.active{border-color:var(--coral);background:#fff8f4;box-shadow:0 12px 30px #f46f5218}.tabs .icon{grid-row:1/3;font-size:38px}.tabs b{font-size:20px}.tabs small{color:var(--muted)}
    .calculator{max-width:1160px;margin:auto;padding:12px 20px 25px;display:grid;grid-template-columns:5fr 7fr}.form,.results{padding:30px;border:1px solid var(--line)}.form{background:#fff;border-radius:22px 0 0 22px}.results{background:linear-gradient(135deg,#edf9f5,#dff3f0);border-radius:0 22px 22px 0}.field{display:block;font-weight:800;margin-bottom:18px}.input{height:52px;display:flex;align-items:center;border:1px solid #ded8d0;border-radius:11px;margin-top:8px;background:#fff;overflow:hidden}.input span{padding:0 13px;color:var(--muted)}.input input{width:100%;height:100%;border:0;outline:0;padding:0 13px;font-weight:800}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.calculate{width:100%;height:55px;border:0;border-radius:12px;background:linear-gradient(90deg,#ff6548,#f47c58);color:#fff;font-size:18px;font-weight:900;cursor:pointer}.main-result{display:flex;justify-content:space-between;align-items:center;min-height:155px}.main-result strong{display:block;color:var(--teal);font-size:clamp(38px,5vw,60px);margin:7px 0}.art{font-size:70px}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}.metric{background:#ffffffc9;border:1px solid #b9ddd7;border-radius:15px;padding:17px}.metric span{display:block;color:var(--muted);font-size:13px}.metric b{display:block;font-size:21px;margin-top:6px}.tip{border-top:1px solid #afd9d2;margin-top:20px;padding-top:16px;color:var(--muted);line-height:1.55}.tip b{color:#d77425}.source{max-width:1120px;margin:0 auto 25px;padding:17px 20px;border:1px solid #f0c98c;background:#fff9ed;border-radius:14px;display:flex;justify-content:space-between}.source a{color:#cf593e;font-weight:900}footer{max-width:1120px;margin:25px auto;padding:25px 0 40px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}.hidden{display:none!important}
    @media(max-width:760px){header{flex-wrap:wrap}.selectors{width:100%}.selectors select{flex:1;min-width:0}.tabs{display:flex;overflow:auto}.tabs button{min-width:215px}.calculator{grid-template-columns:1fr}.form{border-radius:20px 20px 0 0}.results{border-radius:0 0 20px 20px}.metrics{grid-template-columns:1fr}.region{flex-direction:column}.region select{width:100%}footer{margin:20px}}
  </style>
</head>
<body>
  <header><div class="brand"><span class="logo">▦</span>ClearCalc <span class="tag">Global</span></div><div class="selectors"><select id="country"></select><select id="language"><option value="zh">简体中文</option><option value="en">English</option><option value="ja">日本語</option><option value="fr">Français</option><option value="de">Deutsch</option></select></div></header>
  <section class="hero"><span class="eyebrow" id="countryBadge"></span><h1 id="hero"></h1><p id="subtitle"></p><label class="region" id="regionWrap"><span id="regionLabel"></span><select id="region"></select></label></section>
  <section class="tabs"><button data-tool="home" class="active"><span class="icon">🏠</span><b></b><small></small></button><button data-tool="car"><span class="icon">🚙</span><b></b><small></small></button><button data-tool="tax"><span class="icon">🧾</span><b></b><small></small></button></section>
  <section class="calculator"><div class="form" id="form"></div><div class="results"><div class="main-result"><div><span id="resultLabel"></span><strong id="primaryResult"></strong><small id="resultMeta"></small></div><span class="art" id="art">🏡</span></div><div class="metrics"><article class="metric"><span id="metric1Label"></span><b id="metric1"></b></article><article class="metric"><span id="metric2Label"></span><b id="metric2"></b></article></div><div class="tip"><b id="tipTitle"></b><div id="tipText"></div></div></div></section>
  <section class="source hidden" id="source"><span id="sourceText"></span><a id="sourceLink" target="_blank" rel="noreferrer">Official source ↗</a></section>
  <footer id="footer"></footer>
  <script>
    const countries={US:{name:"United States",flag:"🇺🇸",currency:"USD",locale:"en-US",symbol:"$",rate:6.5},JP:{name:"日本",flag:"🇯🇵",currency:"JPY",locale:"ja-JP",symbol:"¥",rate:1.9},SG:{name:"Singapore",flag:"🇸🇬",currency:"SGD",locale:"en-SG",symbol:"S$",rate:3.2},CA:{name:"Canada",flag:"🇨🇦",currency:"CAD",locale:"en-CA",symbol:"C$",rate:4.7},GB:{name:"United Kingdom",flag:"🇬🇧",currency:"GBP",locale:"en-GB",symbol:"£",rate:4.5},DE:{name:"Deutschland",flag:"🇩🇪",currency:"EUR",locale:"de-DE",symbol:"€",rate:3.5},FR:{name:"France",flag:"🇫🇷",currency:"EUR",locale:"fr-FR",symbol:"€",rate:3.5}};
    const regions=[["AL","Alabama",.05],["AK","Alaska",0],["AZ","Arizona",.025],["AR","Arkansas",.039],["CA","California",.093],["CO","Colorado",.044],["CT","Connecticut",.055],["DE","Delaware",.066],["DC","District of Columbia",.085],["FL","Florida",0],["GA","Georgia",.0539],["HI","Hawaii",.0825],["ID","Idaho",.058],["IL","Illinois",.0495],["IN","Indiana",.0295],["IA","Iowa",.038],["KS","Kansas",.057],["KY","Kentucky",.035],["LA","Louisiana",.03],["ME","Maine",.0715],["MD","Maryland",.0475],["MA","Massachusetts",.05],["MI","Michigan",.0425],["MN","Minnesota",.0785],["MS","Mississippi",.044],["MO","Missouri",.047],["MT","Montana",.059],["NE","Nebraska",.052],["NV","Nevada",0],["NH","New Hampshire",0],["NJ","New Jersey",.0637],["NM","New Mexico",.049],["NY","New York",.0685],["NC","North Carolina",.0399],["ND","North Dakota",.0195],["OH","Ohio",.0275],["OK","Oklahoma",.0475],["OR","Oregon",.0875],["PA","Pennsylvania",.0307],["RI","Rhode Island",.0475],["SC","South Carolina",.06],["SD","South Dakota",0],["TN","Tennessee",0],["TX","Texas",0],["UT","Utah",.0455],["VT","Vermont",.066],["VA","Virginia",.0575],["WA","Washington",0],["WV","West Virginia",.0512],["WI","Wisconsin",.053],["WY","Wyoming",0],["PR","Puerto Rico",0],["GU","Guam",0],["VI","U.S. Virgin Islands",0],["AS","American Samoa",0],["MP","Northern Mariana Islands",0]];
    const words={zh:{hero:"把复杂的账，算得明明白白",sub:"房贷、车贷、个税一站式估算，支持 7 个国家与 5 种语言",home:"房贷",car:"车贷",tax:"个税",amount:"贷款金额",price:"车辆价格",down:"首付",years:"贷款期限",rate:"年利率",income:"年收入",deduct:"扣除额",calc:"立即计算",monthly:"每月还款",interest:"利息总额",total:"还款总额",taxDue:"预估所得税",net:"税后年收入",effective:"有效税率",tip:"💡 小贴士",loanTip:"缩短贷款期限通常可以减少总利息，但每月还款会增加。",taxTip:"这是简化估算，不含全部地方税、社保、抵扣和特殊情况。",region:"美国州 / 地区",disclaimer:"仅供规划参考，不构成税务、法律或贷款建议。"},en:{hero:"Make every big number feel simple",sub:"Mortgage, auto loan and income tax estimates for 7 countries in 5 languages",home:"Mortgage",car:"Auto loan",tax:"Income tax",amount:"Loan amount",price:"Vehicle price",down:"Down payment",years:"Loan term",rate:"Annual rate",income:"Annual income",deduct:"Deductions",calc:"Calculate now",monthly:"Monthly payment",interest:"Total interest",total:"Total repayment",taxDue:"Estimated income tax",net:"Annual take-home",effective:"Effective rate",tip:"💡 Smart tip",loanTip:"A shorter term usually reduces total interest, but increases the monthly payment.",taxTip:"Simplified estimate; local taxes, social insurance, credits and special cases may differ.",region:"U.S. state / territory",disclaimer:"For planning only. Not tax, legal or lending advice."},ja:{hero:"複雑なお金を、わかりやすく",sub:"7か国・5言語対応のローン・所得税シミュレーター",home:"住宅ローン",car:"自動車ローン",tax:"所得税",amount:"借入金額",price:"車両価格",down:"頭金",years:"返済期間",rate:"年利率",income:"年収",deduct:"控除額",calc:"計算する",monthly:"毎月返済額",interest:"利息総額",total:"返済総額",taxDue:"所得税の目安",net:"税引後年収",effective:"実効税率",tip:"💡 ヒント",loanTip:"返済期間を短くすると総利息を抑えられます。",taxTip:"主な税率による簡易計算です。",region:"米国の州・地域",disclaimer:"計画用の概算です。"},fr:{hero:"Vos grands calculs, enfin simples",sub:"Crédit immobilier, auto et impôt dans 7 pays et 5 langues",home:"Crédit immobilier",car:"Crédit auto",tax:"Impôt",amount:"Montant emprunté",price:"Prix du véhicule",down:"Apport",years:"Durée",rate:"Taux annuel",income:"Revenu annuel",deduct:"Déductions",calc:"Calculer",monthly:"Mensualité",interest:"Intérêts totaux",total:"Total remboursé",taxDue:"Impôt estimé",net:"Revenu net annuel",effective:"Taux effectif",tip:"💡 Conseil",loanTip:"Une durée plus courte réduit généralement les intérêts.",taxTip:"Estimation simplifiée, hors cas particuliers.",region:"État / territoire américain",disclaimer:"Outil indicatif uniquement."},de:{hero:"Große Zahlen, einfach verstanden",sub:"Baufinanzierung, Autokredit und Einkommensteuer für 7 Länder",home:"Baufinanzierung",car:"Autokredit",tax:"Einkommensteuer",amount:"Kreditbetrag",price:"Fahrzeugpreis",down:"Anzahlung",years:"Laufzeit",rate:"Jahreszins",income:"Jahreseinkommen",deduct:"Abzüge",calc:"Jetzt berechnen",monthly:"Monatsrate",interest:"Zinsen gesamt",total:"Rückzahlung gesamt",taxDue:"Geschätzte Steuer",net:"Nettoeinkommen/Jahr",effective:"Effektiver Satz",tip:"💡 Tipp",loanTip:"Eine kürzere Laufzeit senkt meist die Gesamtzinsen.",taxTip:"Vereinfachte Schätzung ohne Sonderfälle.",region:"US-Bundesstaat / Gebiet",disclaimer:"Nur zur Orientierung."}};
    const sources={US:["2026 · IRS","https://www.irs.gov/businesses/small-businesses-self-employed/state-government-websites"],JP:["2025 · NTA Japan","https://www.nta.go.jp/english/taxes/individual/incometax_2025.htm"],SG:["YA 2026 · IRAS","https://www.iras.gov.sg/taxes/individual-income-tax/basics-of-individual-income-tax/tax-residency-and-tax-rates/individual-income-tax-rates"],CA:["2026 · Canada Revenue Agency","https://www.canada.ca/en/revenue-agency/services/tax/individuals/tax-rates-brackets/current-year.html"],GB:["2026–27 · GOV.UK","https://www.gov.uk/income-tax-rates"],DE:["2026 estimate · BMF","https://www.bundesfinanzministerium.de/Web/EN/Home/home.html"],FR:["2026 · Service-Public.fr","https://www.service-public.fr/particuliers/vosdroits/F1419"]};
    let state={country:"US",lang:"zh",region:"CA",tool:"home",amount:400000,down:80000,years:30,rate:6.5,income:85000,deductions:0};
    const $=id=>document.getElementById(id); const countrySel=$("country"),langSel=$("language"),regionSel=$("region");
    Object.entries(countries).forEach(([k,v])=>countrySel.add(new Option(`${v.flag} ${v.name}`,k))); regions.forEach(r=>regionSel.add(new Option(`${r[0]} · ${r[1]}`,r[0]))); regionSel.value="CA";
    function progressive(x,b){let p=0,t=0;for(const [top,r] of b){t+=Math.max(0,Math.min(x,top)-p)*r;p=top;if(x<=top)break}return t}
    function federalTax(c,g,d){const x=Math.max(0,g-d);if(c==="US")return progressive(Math.max(0,x-16100),[[12400,.1],[50400,.12],[105700,.22],[201775,.24],[256225,.32],[640600,.35],[Infinity,.37]]);if(c==="JP")return progressive(x,[[1950000,.05],[3300000,.1],[6950000,.2],[9000000,.23],[18000000,.33],[40000000,.4],[Infinity,.45]])*1.021;if(c==="SG")return progressive(x,[[20000,0],[30000,.02],[40000,.035],[80000,.07],[120000,.115],[160000,.15],[200000,.18],[240000,.19],[280000,.195],[320000,.2],[500000,.22],[1000000,.23],[Infinity,.24]]);if(c==="CA")return progressive(Math.max(0,x-16452),[[58523,.14],[117045,.205],[181440,.26],[258482,.29],[Infinity,.33]]);if(c==="GB")return progressive(Math.max(0,x-12570),[[37700,.2],[112570,.4],[Infinity,.45]]);if(c==="FR")return progressive(x,[[11600,0],[29579,.11],[84577,.3],[181917,.41],[Infinity,.45]]);return progressive(Math.max(0,x-12348),[[18000,.14],[70000,.24],[277826,.42],[Infinity,.45]])}
    function money(v){const m=countries[state.country];return new Intl.NumberFormat(m.locale,{style:"currency",currency:m.currency,maximumFractionDigits:0}).format(Number.isFinite(v)?v:0)}
    function field(label,key,symbol="",suffix=""){return `<label class="field">${label}<span class="input"><span>${symbol}</span><input type="number" data-key="${key}" value="${state[key]}"><span>${suffix}</span></span></label>`}
    function render(){const t=words[state.lang],m=countries[state.country],r=regions.find(x=>x[0]===state.region);$("countryBadge").textContent=`${m.flag} ${m.name} · ${m.currency}`;$("hero").textContent=t.hero;$("subtitle").textContent=t.sub;$("regionLabel").textContent=t.region;$("regionWrap").classList.toggle("hidden",state.country!=="US");
      const labels=[[t.home,`${t.monthly} · ${t.interest}`],[t.car,`${t.monthly} · ${t.total}`],[t.tax,sources[state.country][0]]];document.querySelectorAll(".tabs button").forEach((b,i)=>{b.querySelector("b").textContent=labels[i][0];b.querySelector("small").textContent=labels[i][1];b.classList.toggle("active",b.dataset.tool===state.tool)});
      if(state.tool==="tax")$("form").innerHTML=field(t.income,"income",m.symbol)+field(t.deduct,"deductions",m.symbol)+`<button class="calculate">${t.calc} →</button>`;else $("form").innerHTML=field(state.tool==="car"?t.price:t.amount,"amount",m.symbol)+field(t.down,"down",m.symbol)+`<div class="row">${field(t.years,"years","","yr")}${field(t.rate,"rate","","%")}</div><button class="calculate">${t.calc} →</button>`;
      document.querySelectorAll("[data-key]").forEach(input=>input.oninput=e=>{state[e.target.dataset.key]=+e.target.value;calculate()});$("tipTitle").textContent=t.tip;$("tipText").textContent=state.tool==="tax"?t.taxTip:t.loanTip;$("art").textContent=state.tool==="tax"?"📊":"🏡";$("source").classList.toggle("hidden",state.tool!=="tax");$("sourceText").textContent=sources[state.country][0]+(state.country==="US"?` · ${r[1]}`:"");$("sourceLink").href=sources[state.country][1];$("footer").textContent=`${t.disclaimer}  © 2026 ClearCalc`;calculate()}
    function calculate(){const t=words[state.lang],r=regions.find(x=>x[0]===state.region);if(state.tool==="tax"){const federal=federalTax(state.country,state.income,state.deductions),local=state.country==="US"?Math.max(0,state.income-state.deductions-16100)*r[2]:0,total=federal+local;$("resultLabel").textContent=t.taxDue;$("primaryResult").textContent=money(total);$("resultMeta").textContent=`${t.effective} ${(state.income?total/state.income*100:0).toFixed(1)}%`;$("metric1Label").textContent=state.country==="US"?"Federal tax":t.net;$("metric1").textContent=money(state.country==="US"?federal:state.income-total);$("metric2Label").textContent=state.country==="US"?`${r[1]} estimate`:t.income;$("metric2").textContent=money(state.country==="US"?local:state.income)}else{const p=Math.max(0,state.amount-state.down),n=Math.max(1,state.years*12),mr=Math.max(0,state.rate)/1200,monthly=mr?p*mr*(1+mr)**n/((1+mr)**n-1):p/n,total=monthly*n;$("resultLabel").textContent=t.monthly;$("primaryResult").textContent=money(monthly);$("resultMeta").textContent=`${n} payments`;$("metric1Label").textContent=t.interest;$("metric1").textContent=money(total-p);$("metric2Label").textContent=t.total;$("metric2").textContent=money(total)}}
    countrySel.onchange=e=>{state.country=e.target.value;state.rate=countries[state.country].rate;render()};langSel.onchange=e=>{state.lang=e.target.value;document.documentElement.lang=state.lang;render()};regionSel.onchange=e=>{state.region=e.target.value;render()};document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{state.tool=b.dataset.tool;if(state.tool==="car")state.years=5;render()});render();
  </script>
</body>
</html>
